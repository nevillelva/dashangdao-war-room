# ==============================================================================
# 54088 戰情室 — 系統自主選股排程 (GitHub Actions)
# ------------------------------------------------------------------------------
# 放到你的 repo：.github/workflows/system_scheduler.yml
#
# 時區換算（台灣 UTC+8 → GitHub Actions 用 UTC）：
#   22:00 台灣選股      = 14:00 UTC
#   08:55 台灣總經閘門  = 00:55 UTC
#   09:01 台灣開盤執行  = 01:01 UTC
#
# 注意：GitHub Actions 的 cron 不保證準點（可能延遲數分鐘），對這個用途可接受。
# 只在台灣交易日跑；非交易日腳本會因為抓不到當日資料而自然空轉，不會亂下單。
#
# 需在 repo 的 Settings → Secrets and variables → Actions 設定：
#   SUPABASE_URL, SUPABASE_KEY, FINMIND_TOKEN
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID （選填，要推播才需要）
# ==============================================================================
name: 系統自主選股排程

on:
  schedule:
    - cron: '0 14 * * 1-5'    # 週一至週五 14:00 UTC = 台灣 22:00 選股
    - cron: '55 0 * * 1-5'    # 週一至週五 00:55 UTC = 台灣 08:55 總經閘門
    #   （原本設 2-6 會讓「週五晚上選的股」在「週六」早上被執行，週六沒開盤）
    - cron: '1 1 * * 1-5'     # 週一至週五 01:01 UTC = 台灣 09:01 開盤執行
    # 【V160 新增】資料源健康度檢查：台灣時間 21:30（選股前30分鐘）。
    # 刻意排在選股之前——如果資料源壞了，你會在選股跑之前就先收到警報，
    # 而不是等到隔天發現選股結果怪怪的才回頭查。
    - cron: '30 13 * * 1-5'   # 週一至週五 13:30 UTC = 台灣 21:30 資料源健康檢查
    #   週五 22:00 選的股會留在 pending，等到下週一 09:01 才執行
  workflow_dispatch:          # 允許手動觸發測試

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install supabase yfinance requests pandas numpy

      - name: 判斷階段並執行
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 【V160 關鍵修復】總指揮官回報：早上沒收到閘門推播、開盤執行推播裡
          # 出場清單同一檔重複兩次。根因：原本用「執行當下的實際時鐘小時」判斷
          # 要跑哪個階段，但 GitHub Actions 排程觸發本來就會延遲（官方文件明載，
          # 尖峰時段常見延遲5-30分鐘）。如果08:55的閘門排程延遲超過6分鐘、跨過
          # 整點（UTC 00:55→01:xx），小時判斷法會把它誤判成09:01的開盤執行時段，
          # 閘門推播因此消失，而且還可能跟真正的09:01執行排程前後各跑一次，
          # 導致當天執行階段跑了兩次、出場清單看起來重複。
          #
          # 改用 github.event.schedule（GitHub 官方提供的「這次到底是哪一條cron
          # 觸發的」精確字串），不管實際延遲多久，判斷永遠準確，不受延遲影響。
          case "${{ github.event.schedule }}" in
            "0 14 * * 1-5") STAGE="signal" ;;
            "55 0 * * 1-5") STAGE="gate" ;;
            "1 1 * * 1-5")  STAGE="execute" ;;
            "30 13 * * 1-5") STAGE="health" ;;
            *) STAGE="signal" ;;   # 手動觸發（workflow_dispatch）測試用，預設跑 signal
          esac
          echo "本次由「${{ github.event.schedule }}」觸發，判斷階段：$STAGE"
          python system_scheduler.py --stage $STAGE
